<script>
    document.addEventListener("DOMContentLoaded", function () {
        var ClientId = #PrescriptionRenewalClientId#;
        if (ClientId > 0) {
            document.querySelectorAll('.auth-buttons').forEach(function (container) {
                container.innerHTML = '';
                var shopBtn = document.createElement('a');
                shopBtn.href = '/prescription_renewal/main.aspx';
                shopBtn.className = 'btn btn-shop-now';
                shopBtn.innerText = 'RENEW MY PRESCRIPTION';
                shopBtn.dataset.elementId = 'Renew_CTA';
                shopBtn.dataset.description = 'RenewMyPrescription';
                container.appendChild(shopBtn);
            });
            var renewText = document.querySelector('.renew-text');
            if (renewText) {
                renewText.innerText = 'Renew your prescription online for only $#PrescriptionRenewalAmount#.';
            }
            var renewButtons = document.querySelector('.renew-buttons');
            if (renewButtons) {
                renewButtons.innerHTML = '';
                var renewBtn = document.createElement('a');
                renewBtn.href = '/prescription_renewal/main.aspx';
                renewBtn.className = 'btn btn-renew';
                renewBtn.innerText = 'RENEW MY PRESCRIPTION';
                renewBtn.dataset.elementId = 'Renew_CTA';
                renewBtn.dataset.description = 'RenewMyPrescription';
                renewButtons.appendChild(renewBtn);
            }
        }
    });

    $('#ctl00_ContentPlaceHolderProductDisplay_btnLogin').on('click', function () {
        tealium_data2track.push({ 'id': 'Click', 'data_element_id': 'Login_CTA', 'data_description': 'Login' });
    });
    $('#ctl00_ContentPlaceHolderProductDisplay_btnRegister').on('click', function () {
        tealium_data2track.push({ 'id': 'Click', 'data_element_id': 'Register_CTA', 'data_description': 'Register' });
    });
    $('#ctl00_ContentPlaceHolderProductDisplay_btnRenewMyPrescription').on('click', function () {
        tealium_data2track.push({ 'id': 'Click', 'data_element_id': 'Renew_CTA', 'data_description': 'RenewMyPrescription' });
    });

    const faqItems = document.querySelectorAll('.faq-item summary'); faqItems.forEach((summary) => { const text = summary.textContent.trim().replace(/\s+/g, ''); summary.setAttribute('data-element-id', `${text}-FAQ`); summary.setAttribute('data-description', `${text}`); summary.setAttribute('data-analytics-available-call', `0`); summary.addEventListener('click', (event) => { PrescriptionRenewalFaqEvent(text + '-FAQ', text); }); });
</script>
